# ==============================
# Kitty configuration
# Optimized for KDE Plasma + Wayland + NVIDIA
# ==============================

enable_audio_bell no
disable_ligatures never

# Font
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
font_size        13

# Cursor
cursor_shape     beam
cursor_beam_thickness 1.8
mouse_hide_wait 3.0

# Scrollback
scrollback_lines 10000

# Window padding
window_padding_width 10

# ==============================
# Transparency (Wayland + NVIDIA workaround)
# ==============================

# Kitty intenta transparencia pero puede fallar en Wayland con NVIDIA
background_opacity 0.90

# Tint para simular transparencia cuando no funciona
background_tint 0.85

# Evita blur que no funciona bien en Wayland + NVIDIA
background_blur 0

# url color and style
url_color #61afef
url_style curly
detect_urls yes


# ==============================
# Colors
# ==============================

foreground #cdd6f4
background #1e1e2e

selection_foreground #1e1e2e
selection_background #f5e0dc

cursor #f5e0dc

# Normal colors
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

# Bright colors
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# ==============================
# Performance tweaks
# ==============================

repaint_delay 10
input_delay 3
sync_to_monitor yes

# ==============================
# Tabs
# ==============================

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style angled
tab_separator " ┇ "
inactive_tab_background #e06c75
inactive_tab_foreground #000000
active_tab_background #98c379
tar_bar_margin_color black

# ==============================
# Keybindings
# ==============================

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+w close_tab
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd

map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

map f1 copy_to_buffer a
map f2 paste_from_buffer a
map f3 copy_to_buffer b
map f4 paste_from_buffer b

shell zsh
